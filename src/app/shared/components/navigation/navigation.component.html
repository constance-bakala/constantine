<nav class="navbar navbar-expand-lg bg-secondary fixed-top" id="mainNav">
  <div class="container">

    <!-- Brand = ancre uniquement -->
    <a class="navbar-brand js-scroll-trigger" href="#page-top">
      <img src="assets/style-sauvage_only_logo-removebg.png" height="40px">
      DÉLICE ÉTERNEL
    </a>

    <span>
      <select
        class="form-control"
        #selectedLang
        (change)="switchLang(selectedLang.value)">
        <option
          *ngFor="let language of translate.getLangs()"
          [value]="language"
          [selected]="language === translate.currentLang">
          {{ language }}
        </option>
      </select>
    </span>

    <button
      class="navbar-toggler navbar-toggler-right font-weight-bold bg-primary text-white rounded"
      type="button"
      data-toggle="collapse"
      data-target="#navbarResponsive"
      aria-controls="navbarResponsive"
      aria-expanded="false"
      aria-label="Toggle navigation">
      Menu
      <i class="fas fa-bars"></i>
    </button>

    <div class="collapse navbar-collapse" id="navbarResponsive">
      <ul class="navbar-nav ml-auto smooth-scroll">

        <!-- ===== ANCRES (scrollspy OK) ===== -->

        <li class="nav-item mx-0 mx-lg-1">
          <a class="nav-link py-3 px-0 px-lg-3 rounded js-scroll-trigger" href="#portfolio">
            <span>PORTFOLIO</span>
          </a>
        </li>

        <li class="nav-item mx-0 mx-lg-1">
          <a class="nav-link py-3 px-0 px-lg-3 rounded js-scroll-trigger" href="#about">
            <span>{{ 'ABOUT' | translate }}</span>
          </a>
        </li>

        <li class="nav-item mx-0 mx-lg-1">
          <a class="nav-link py-3 px-0 px-lg-3 rounded js-scroll-trigger" href="#contact">
            <span class="ajust">CONTACT</span>
          </a>
        </li>

        <!-- ===== ROUTING ANGULAR (PAS de js-scroll-trigger) ===== -->

        <li
          class="nav-item mx-0 mx-lg-1"
          *ngIf="!(afAuth.authState | async) || (afAuth.authState | async)?.isAnonymous">
          <a
            class="nav-link py-3 px-0 px-lg-3 rounded"
            [routerLink]="['/auth/signin']">
            <mat-icon>account_circle</mat-icon>
            <span class="ajust">{{ 'CONNECT' | translate }}</span>
          </a>
        </li>

        <li class="nav-item mx-0 mx-lg-1">
          <a
            class="nav-link py-3 px-0 px-lg-3 rounded"
            [routerLink]="['/shopping-cart']"
            aria-label="Toggle navigation">
            <mat-icon>shopping_cart</mat-icon>
            <span class="badge badge-pill red">
              {{ nbSelectedItems$ | async }}
            </span>
          </a>
        </li>

        <li
          class="nav-item mx-0 mx-lg-1"
          *ngIf="!!(afAuth.authState | async) && !(afAuth.authState | async)?.isAnonymous">
          <a
            class="nav-link py-3 px-0 px-lg-3 rounded"
            (click)="disconnect()">
            <mat-icon>exit_to_app</mat-icon>
            <span class="ajust">
              {{ 'DISCONNECT' | translate }}
              <br>
              <span style="font-size: 10px; margin-left: 10px">
                ({{ (afAuth.authState | async)?.email }})
              </span>
            </span>
          </a>
        </li>

      </ul>
    </div>

    <div class="filler"></div>

    <ng-container *ngIf="(afAuth.authState | async) && !(afAuth.authState | async)?.isAnonymous">
      <img
        class="user-avatar"
        [src]="(afAuth.authState | async)?.photoURL"
        *ngIf="!!((afAuth.authState | async)?.photoURL)">
    </ng-container>

  </div>
</nav>
