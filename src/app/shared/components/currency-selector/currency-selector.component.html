@if (isFrench) {
  <div class="d-flex align-items-center gap-2">
    <label class="mb-0 small text-muted text-uppercase">{{'PRODUCTS.CURRENCY' | translate}}&nbsp;:</label>
    <select class="form-control form-control-sm w-auto" (change)="onCurrencyChange($any($event.target).value)">
      <option value="EUR" [selected]="currentCurrency === 'EUR'">Euro (€)</option>
      <option value="XAF" [selected]="currentCurrency === 'XAF'">Franc CFA (FCFA)</option>
    </select>
  </div>
}
