<!-- Bouton flottant -->
<button class="chat-fab" (click)="toggle()" [attr.aria-label]="'Assistant'">
  <i class="fas" [class.fa-comments]="!isOpen" [class.fa-times]="isOpen"></i>
</button>

<!-- Panneau de conversation -->
@if (isOpen) {
  <div class="chat-panel">

    <div class="chat-header">
      <span class="chat-header-title">
        <i class="fas fa-robot mr-1"></i>
        {{ 'CHAT_WIDGET_TITLE' | translate }}
      </span>
      <button class="chat-close-btn" (click)="close()">✕</button>
    </div>

    <div class="chat-messages" #messagesContainer>
      @for (msg of messages; track $index) {
        <div class="chat-bubble" [class.chat-bubble--user]="msg.role === 'user'"
                                 [class.chat-bubble--model]="msg.role === 'model'">
          {{ msg.text }}
        </div>
      }

      @if (isLoading) {
        <div class="chat-bubble chat-bubble--model chat-bubble--typing">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      }
    </div>

    <div class="chat-input-row">
      <textarea
        class="chat-input"
        [(ngModel)]="userInput"
        (keydown)="onKeydown($event)"
        [placeholder]="'CHAT_WIDGET_PLACEHOLDER' | translate"
        rows="1"
        [disabled]="isLoading">
      </textarea>
      <button class="chat-send-btn" [disabled]="!userInput.trim() || isLoading" (click)="send()">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>

  </div>
}
