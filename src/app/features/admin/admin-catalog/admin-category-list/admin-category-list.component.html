<div class="catalog-toolbar">
  <button class="btn-catalog-new" (click)="openCreateForm()">+ Nouvelle catégorie</button>
</div>

<!-- Formulaire de création -->
<div *ngIf="showCreateForm" class="create-form-card">
  <h3 class="form-title">Créer une catégorie</h3>

  <div class="form-field">
    <label class="form-label">Préfixe <span class="required">*</span>
      <span class="hint"> — segment d'URI&nbsp;: lettres minuscules, chiffres, tirets (ex&nbsp;: bijoux, sac-femme)</span>
    </label>
    <input type="text" [(ngModel)]="newPrefix" class="form-input"
           placeholder="ex : bijoux"
           pattern="[a-z0-9]([a-z0-9-]*[a-z0-9])?"
           autocomplete="off"
           (input)="onPrefixInput($event)" />
  </div>
  <div class="form-field">
    <label class="form-label">Titre FR <span class="required">*</span></label>
    <input type="text" [(ngModel)]="newTitle" class="form-input"
           placeholder="ex : Masques africains" />
  </div>
  <div class="form-field">
    <label class="form-label">Titre EN <span class="optional">(optionnel)</span></label>
    <input type="text" [(ngModel)]="newTitleEn" class="form-input"
           placeholder="ex : African masks" />
  </div>
  <div class="form-field">
    <label class="form-label">Description <span class="optional">(optionnel)</span></label>
    <div class="lang-tabs">
      <button type="button" class="lang-tab" [class.active]="descLang === 'fr'" (click)="descLang = 'fr'">🇫🇷 FR</button>
      <button type="button" class="lang-tab" [class.active]="descLang === 'en'" (click)="descLang = 'en'">🇬🇧 EN</button>
    </div>
    <quill-editor [hidden]="descLang !== 'fr'"
                  [ngModel]="newDescription"
                  (onContentChanged)="onNewDescChanged('fr', $event)"
                  [modules]="quillModules"
                  format="html"
                  placeholder="Description en français…"
                  class="quill-desc">
    </quill-editor>
    <quill-editor [hidden]="descLang !== 'en'"
                  [ngModel]="newDescriptionEn"
                  (onContentChanged)="onNewDescChanged('en', $event)"
                  [modules]="quillModules"
                  format="html"
                  placeholder="Description in English…"
                  class="quill-desc">
    </quill-editor>
  </div>

  <p *ngIf="createError" class="form-error">{{ createError }}</p>

  <div class="form-actions">
    <button class="btn-save" [disabled]="creating" (click)="submitCreateCategory()">
      {{ creating ? '…' : 'Créer' }}
    </button>
    <button class="btn-cancel" (click)="cancelCreate()">Annuler</button>
  </div>
</div>

<!-- Liste des catégories -->
<div *ngIf="categories.length === 0 && !showCreateForm" class="empty-state">
  Aucune catégorie. Créez-en une pour commencer.
</div>

<div class="category-list">
  <div *ngFor="let cat of categories; trackBy: trackByPrefix" class="category-card">
    <div class="category-card-header">
      <div class="category-meta">
        <span class="category-title">{{ cat.title }}</span>
        <span class="category-prefix">{{ cat.prefix }}</span>
      </div>
      <div class="category-actions">
        <button class="btn-publish"
                [class.published]="cat.published"
                (click)="toggleCategoryPublished(cat)">
          {{ cat.published ? '✓ Publié' : 'Publier' }}
        </button>
        <button class="btn-view" (click)="categorySelected.emit(cat)">Gérer →</button>
        <button class="btn-delete-cat" (click)="deleteCategory(cat)">✕</button>
      </div>
    </div>
  </div>
</div>
